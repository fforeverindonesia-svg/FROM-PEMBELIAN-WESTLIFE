<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>PAYMENT FAILED</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050505;
color:white;
overflow-x:hidden;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:30px;
position:relative;
}

body::before{
content:'';
position:fixed;
width:700px;
height:700px;
background:red;
filter:blur(180px);
opacity:.18;
top:-200px;
right:-200px;
animation:float 7s infinite alternate;
}

body::after{
content:'';
position:fixed;
width:700px;
height:700px;
background:#ff0000;
filter:blur(200px);
opacity:.12;
bottom:-300px;
left:-200px;
animation:float2 9s infinite alternate;
}

@keyframes float{
from{transform:translateY(0px);}
to{transform:translateY(50px);}
}

@keyframes float2{
from{transform:translateY(0px);}
to{transform:translateY(-60px);}
}

.container{
width:100%;
max-width:1100px;
display:grid;
grid-template-columns:1fr 1fr;
gap:25px;
z-index:2;
}

.poster{
background:rgba(255,255,255,.05);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.1);
border-radius:30px;
overflow:hidden;
box-shadow:0 0 40px rgba(255,0,0,.2);
}

.poster img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

.content{
background:rgba(255,255,255,.05);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.1);
border-radius:30px;
padding:35px;
box-shadow:0 0 40px rgba(255,0,0,.2);
}

.failed{
font-size:42px;
font-weight:700;
color:#ff2e2e;
margin-bottom:10px;
}

.subtitle{
opacity:.7;
margin-bottom:25px;
line-height:1.6;
}

.box{
background:rgba(255,255,255,.05);
padding:18px;
border-radius:18px;
margin-bottom:15px;
border:1px solid rgba(255,255,255,.08);
}

.label{
font-size:13px;
opacity:.6;
margin-bottom:6px;
}

.value{
font-size:16px;
font-weight:500;
}

.warning{
margin-top:20px;
padding:18px;
background:rgba(255,0,0,.08);
border:1px solid rgba(255,0,0,.25);
border-radius:18px;
color:#ffb3b3;
line-height:1.7;
}

.btn{
margin-top:25px;
width:100%;
padding:16px;
border:none;
border-radius:16px;
background:linear-gradient(45deg,#ff0000,#ff4d4d);
color:white;
font-size:16px;
font-weight:700;
cursor:pointer;
transition:.3s;
}

.btn:hover{
transform:scale(1.03);
box-shadow:0 0 25px red;
}

@media(max-width:900px){

.container{
grid-template-columns:1fr;
}

.failed{
font-size:34px;
}

}

</style>
</head>
<body>

<div class="container">

<div class="poster">
<img id="banner" src="banner.jpg">
</div>

<div class="content">

<div class="failed">
PAYMENT FAILED
</div>

<div class="subtitle">
Data pembayaran anda gagal diproses.
Silahkan periksa kembali data pemesanan anda.
</div>

<div class="box">
<div class="label">EVENT</div>
<div class="value" id="eventName"></div>
</div>

<div class="box">
<div class="label">NAMA</div>
<div class="value" id="nama"></div>
</div>

<div class="box">
<div class="label">EMAIL</div>
<div class="value" id="email"></div>
</div>

<div class="box">
<div class="label">WHATSAPP</div>
<div class="value" id="wa"></div>
</div>

<div class="box">
<div class="label">ALAMAT</div>
<div class="value" id="alamat"></div>
</div>

<div class="box">
<div class="label">KATEGORI</div>
<div class="value" id="kategori"></div>
</div>

<div class="box">
<div class="label">JUMLAH TIKET</div>
<div class="value" id="jumlah"></div>
</div>

<div class="box">
<div class="label">TOTAL</div>
<div class="value" id="total"></div>
</div>

<div class="warning">
Data tidak lengkap atau pembayaran gagal diverifikasi oleh sistem.
</div>

<button class="btn" onclick="window.location.href='index.html'">
KEMBALI
</button>

</div>

</div>

<script>

const data = JSON.parse(
localStorage.getItem('westlife_failed_payment')
);

if(data){

document.getElementById('eventName').innerText = data.eventName || '-';

document.getElementById('nama').innerText = data.nama || '-';

document.getElementById('email').innerText = data.email || '-';

document.getElementById('wa').innerText = data.wa || '-';

document.getElementById('alamat').innerText = data.alamat || '-';

document.getElementById('kategori').innerText = data.kategori || '-';

document.getElementById('jumlah').innerText = data.jumlah || '-';

document.getElementById('total').innerText = data.total || '-';

if(data.banner){
document.getElementById('banner').src = data.banner;
}

}

</script>

</body>
</html>
