<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pembayaran Gagal</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:black;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
overflow:hidden;
}

body::before{
content:'';
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle,#ff000044,transparent);
animation:bg 5s infinite alternate;
z-index:-1;
}

@keyframes bg{
0%{transform:scale(1);}
100%{transform:scale(1.2);}
}

.card{
width:100%;
max-width:420px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
border-radius:25px;
padding:20px;
border:1px solid rgba(255,255,255,0.1);
box-shadow:0 0 40px rgba(255,0,0,0.4);
animation:fade 1s ease;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.banner{
width:100%;
border-radius:20px;
margin-bottom:20px;
}

h1{
text-align:center;
font-size:30px;
color:#ff4d4d;
margin-bottom:15px;
text-shadow:0 0 20px red;
}

.failed{
font-size:80px;
text-align:center;
margin-bottom:10px;
animation:shake 1s infinite;
}

@keyframes shake{
0%{transform:translateX(0);}
25%{transform:translateX(-5px);}
50%{transform:translateX(5px);}
75%{transform:translateX(-5px);}
100%{transform:translateX(0);}
}

.info{
background:#111;
padding:15px;
border-radius:15px;
line-height:1.8;
margin-top:15px;
border:1px solid #333;
}

.reason{
margin-top:20px;
background:#2a0000;
padding:15px;
border-radius:15px;
text-align:center;
color:#ffb3b3;
}

a{
display:block;
margin-top:20px;
text-align:center;
padding:15px;
background:linear-gradient(45deg,#ff0000,#ff4d4d);
border-radius:15px;
text-decoration:none;
color:white;
font-weight:bold;
font-size:18px;
transition:0.3s;
}

a:hover{
transform:scale(1.03);
}

</style>
</head>
<body>

<div class="card">

<div class="failed">✖</div>

<h1>PEMBAYARAN GAGAL</h1>

<img src="banner.png" class="banner" id="banner">

<div class="info" id="info">
Memuat data...
</div>

<div class="reason">
Data pemesanan tidak lengkap atau pembayaran gagal diverifikasi.
Silakan periksa kembali data Anda.
</div>

<a href="index.html">
KEMBALI KE PEMESANAN
</a>

</div>

<script>

const data =
JSON.parse(
localStorage.getItem('westlifeData')
);

if(data){

document.getElementById('info').innerHTML=`

<b>Event:</b> WESTLIFE THE ANNIVERSARY TOUR<br><br>

<b>Nama:</b> ${data.nama}<br>

<b>Email:</b> ${data.email}<br>

<b>WhatsApp:</b> ${data.wa}<br>

<b>Kategori:</b> ${data.kategori}<br>

<b>Jumlah Tiket:</b> ${data.jumlah}

`;

document.getElementById('banner').src=data.banner;

}

</script>

</body>
</html>
