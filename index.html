<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WESTLIFE Ticket Booking</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#050505;
color:white;
overflow-x:hidden;
}

body::before{
content:'';
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at top,#ff000055,transparent 40%),
radial-gradient(circle at bottom,#ffffff11,transparent 30%);
z-index:-1;
animation:bgMove 10s linear infinite alternate;
}

@keyframes bgMove{
0%{transform:scale(1);}
100%{transform:scale(1.1);}
}

.container{
width:95%;
max-width:450px;
margin:20px auto;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,0.1);
border-radius:25px;
overflow:hidden;
box-shadow:0 0 30px rgba(255,0,0,0.3);
animation:fadeUp 1s ease;
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.banner{
width:100%;
height:250px;
object-fit:cover;
}

.content{
padding:20px;
}

h1{
font-size:28px;
text-align:center;
margin-bottom:10px;
color:#fff;
text-shadow:0 0 15px red;
}

.timer{
background:#ff0000;
padding:12px;
text-align:center;
border-radius:15px;
font-weight:bold;
margin-bottom:20px;
animation:pulse 1s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.03);}
100%{transform:scale(1);}
}

.inputBox{
margin-bottom:15px;
}

.inputBox label{
display:block;
margin-bottom:6px;
font-size:14px;
}

.inputBox input,
.inputBox select{
width:100%;
padding:14px;
border:none;
border-radius:15px;
background:#111;
color:white;
outline:none;
font-size:15px;
}

.summary{
background:#111;
padding:15px;
border-radius:15px;
margin-top:15px;
line-height:1.8;
border:1px solid #333;
}

.qrisBox{
display:none;
margin-top:20px;
text-align:center;
animation:fadeIn 1s ease;
}

.qrisBox img{
width:100%;
border-radius:20px;
box-shadow:0 0 30px rgba(255,255,255,0.2);
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

button{
width:100%;
padding:16px;
border:none;
border-radius:15px;
background:linear-gradient(45deg,#ff0000,#ff4d4d);
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
margin-top:20px;
transition:0.3s;
box-shadow:0 0 20px rgba(255,0,0,0.5);
}

button:hover{
transform:scale(1.03);
}

.note{
text-align:center;
font-size:12px;
margin-top:15px;
opacity:0.7;
}
</style>
</head>
<body>

<div class="container">

<img src="banner.png" class="banner">

<div class="content">

<h1>WESTLIFE</h1>

<div class="timer" id="timer">
Sisa Waktu: 07:00
</div>

<div class="inputBox">
<label>Nama Lengkap</label>
<input type="text" id="nama" required>
</div>

<div class="inputBox">
<label>Email</label>
<input type="email" id="email" required>
</div>

<div class="inputBox">
<label>Nomor WhatsApp</label>
<input type="number" id="wa" required>
</div>

<div class="inputBox">
<label>Kategori Tiket</label>
<select id="kategori" required>
<option value="">Pilih Tiket</option>
<option value="Festival A">Festival A - Rp 1.500.000</option>
<option value="VIP">VIP - Rp 3.000.000</option>
<option value="VVIP">VVIP - Rp 5.000.000</option>
</select>
</div>

<div class="inputBox">
<label>Jumlah Tiket</label>
<input type="number" id="jumlah" min="1" required>
</div>

<div class="summary" id="summary">
<b>Ringkasan Pembelian</b><br><br>
Nama: -<br>
Kategori: -<br>
Jumlah: -<br>
Total: -
</div>

<div class="qrisBox" id="qrisBox">
<h3 style="margin-bottom:10px;">Scan QRIS Pembayaran</h3>
<img src="qris.jpg">
</div>

<button onclick="beliSekarang()">
BELI SEKARANG
</button>

<div class="note">
Pastikan semua data diisi dengan benar
</div>

</div>
</div>

<script>

let time = 420;

const timer = document.getElementById('timer');

setInterval(()=>{
let menit = Math.floor(time/60);
let detik = time%60;

if(detik<10){
detik='0'+detik;
}

timer.innerHTML=`Sisa Waktu: ${menit}:${detik}`;

if(time<=0){
location.reload();
}

time--;
},1000);

const jumlah = document.getElementById('jumlah');

jumlah.addEventListener('input',()=>{

const qris = document.getElementById('qrisBox');

if(jumlah.value > 0){
qris.style.display='block';
}else{
qris.style.display='none';
}

updateSummary();

});

document.getElementById('nama').addEventListener('input',updateSummary);
document.getElementById('kategori').addEventListener('change',updateSummary);

function updateSummary(){

const nama =
document.getElementById('nama').value;

const kategori =
document.getElementById('kategori').value;

const jumlah =
document.getElementById('jumlah').value;

let harga = 0;

if(kategori==='Festival A'){
harga=1500000;
}

if(kategori==='VIP'){
harga=3000000;
}

if(kategori==='VVIP'){
harga=5000000;
}

const total = harga * jumlah;

document.getElementById('summary').innerHTML=`

<b>Ringkasan Pembelian</b><br><br>

Nama: ${nama || '-'}<br>

Kategori: ${kategori || '-'}<br>

Jumlah: ${jumlah || '-'}<br>

Total: Rp ${total.toLocaleString('id-ID')}

`;

}

function beliSekarang(){

const nama =
document.getElementById('nama').value;

const email =
document.getElementById('email').value;

const wa =
document.getElementById('wa').value;

const kategori =
document.getElementById('kategori').value;

const jumlah =
document.getElementById('jumlah').value;

if(
!nama ||
!email ||
!wa ||
!kategori ||
!jumlah
){
alert('Harap isi semua data!');
return;
}

const data = {

nama:nama,
email:email,
wa:wa,
kategori:kategori,
jumlah:jumlah,
banner:'banner.png'

};

localStorage.setItem(
'westlifeData',
JSON.stringify(data)
);

window.location.href='failed.html';

}

</script>

</body>
</html>
