<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WESTLIFE TICKET PAYMENT</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050505;
color:white;
overflow-x:hidden;
min-height:100vh;
padding:30px;
position:relative;
}

body::before{
content:'';
position:fixed;
width:700px;
height:700px;
background:red;
filter:blur(180px);
opacity:.15;
top:-200px;
right:-200px;
animation:float 7s infinite alternate;
}

body::after{
content:'';
position:fixed;
width:700px;
height:700px;
background:#ff0000;
filter:blur(180px);
opacity:.12;
bottom:-250px;
left:-200px;
animation:float2 9s infinite alternate;
}

@keyframes float{
from{transform:translateY(0);}
to{transform:translateY(50px);}
}

@keyframes float2{
from{transform:translateY(0);}
to{transform:translateY(-50px);}
}

.container{
max-width:1200px;
margin:auto;
display:grid;
grid-template-columns:1fr 1fr;
gap:25px;
position:relative;
z-index:2;
}

.poster{
background:rgba(255,255,255,.05);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.08);
border-radius:28px;
overflow:hidden;
box-shadow:0 0 40px rgba(255,0,0,.15);
animation:fadeUp 1s ease;
}

.poster img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

.form-box{
background:rgba(255,255,255,.05);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.08);
border-radius:28px;
padding:35px;
box-shadow:0 0 40px rgba(255,0,0,.15);
animation:fadeUp 1.2s ease;
}

.title{
font-size:36px;
font-weight:700;
margin-bottom:10px;
}

.subtitle{
opacity:.7;
margin-bottom:30px;
line-height:1.7;
}

.input-box{
margin-bottom:18px;
}

.input-box label{
display:block;
margin-bottom:8px;
font-size:14px;
opacity:.8;
}

.input-box input,
.input-box textarea,
.input-box select{
width:100%;
padding:15px;
border:none;
outline:none;
border-radius:14px;
background:rgba(255,255,255,.06);
color:white;
font-size:15px;
border:1px solid rgba(255,255,255,.08);
}

textarea{
resize:none;
height:90px;
}

.total-box{
margin-top:20px;
padding:18px;
border-radius:18px;
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.08);
}

.total-title{
opacity:.7;
margin-bottom:8px;
}

.total-price{
font-size:28px;
font-weight:700;
color:#ff4d4d;
}

.qris{
margin-top:25px;
display:none;
text-align:center;
animation:fadeUp .5s ease;
}

.qris img{
width:240px;
border-radius:20px;
border:3px solid rgba(255,255,255,.08);
}

.btn{
width:100%;
padding:18px;
margin-top:30px;
border:none;
border-radius:18px;
background:linear-gradient(45deg,#ff0000,#ff4d4d);
color:white;
font-size:17px;
font-weight:700;
cursor:pointer;
transition:.3s;
}

.btn:hover{
transform:scale(1.03);
box-shadow:0 0 25px red;
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@media(max-width:900px){

.container{
grid-template-columns:1fr;
}

.title{
font-size:30px;
}

}

</style>
</head>
<body>

<div class="container">

<div class="poster">
<img src="banner.jpg">
</div>

<div class="form-box">

<div class="title">
WESTLIFE TOUR
</div>

<div class="subtitle">
Silahkan lengkapi data pembelian tiket konser anda.
</div>

<div class="input-box">
<label>Nama Lengkap</label>
<input type="text" id="nama">
</div>

<div class="input-box">
<label>Email</label>
<input type="email" id="email">
</div>

<div class="input-box">
<label>WhatsApp</label>
<input type="text" id="wa">
</div>

<div class="input-box">
<label>Alamat</label>
<textarea id="alamat"></textarea>
</div>

<div class="input-box">
<label>Kategori Tiket</label>
<select id="ticketCategory" onchange="hitungTotal()">
<option value="">Pilih Tiket</option>
<option value="VIP" data-price="3500000">VIP - Rp3.500.000</option>
<option value="Festival" data-price="1800000">Festival - Rp1.800.000</option>
<option value="Regular" data-price="950000">Regular - Rp950.000</option>
</select>
</div>

<div class="input-box">
<label>Jumlah Tiket</label>
<input type="number" id="jumlah" min="1" onchange="hitungTotal()">
</div>

<div class="total-box">
<div class="total-title">TOTAL PEMBAYARAN</div>
<div class="total-price" id="totalHarga">
Rp0
</div>
</div>

<div class="qris" id="qrisBox">
<img src="qris.jpg">
</div>

<button class="btn" onclick="simpanDataPembelian()">
BELI SEKARANG
</button>

</div>

</div>

<script>

function hitungTotal(){

const kategori = document.getElementById('ticketCategory');
const jumlah = document.getElementById('jumlah').value;

const selected = kategori.options[kategori.selectedIndex];

const price = selected.getAttribute('data-price');

const total = (price || 0) * jumlah;

document.getElementById('totalHarga').innerText =
'Rp' + Number(total).toLocaleString('id-ID');

if(total > 0){
document.getElementById('qrisBox').style.display = 'block';
}else{
document.getElementById('qrisBox').style.display = 'none';
}

}

function simpanDataPembelian(){

const data = {

eventName:'WESTLIFE THE WILD DREAMS TOUR',

nama:document.getElementById('nama').value,

email:document.getElementById('email').value,

wa:document.getElementById('wa').value,

alamat:document.getElementById('alamat').value,

kategori:document.getElementById('ticketCategory').value,

jumlah:document.getElementById('jumlah').value,

total:document.getElementById('totalHarga').innerText,

banner:'banner.jpg'

};

localStorage.setItem(
'westlife_failed_payment',
JSON.stringify(data)
);

window.location.href='failed.html';

}

</script>

</body>
</html>
