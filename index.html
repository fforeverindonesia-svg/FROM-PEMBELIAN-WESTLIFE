<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Westlife Ticketing</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050505;
color:white;
padding:20px;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.bg{
position:fixed;
width:500px;
height:500px;
background:red;
filter:blur(180px);
opacity:.2;
border-radius:50%;
animation:move 8s infinite alternate;
}

@keyframes move{
0%{transform:translate(-100px,-100px);}
100%{transform:translate(150px,150px);}
}

.container{
position:relative;
z-index:2;
width:100%;
max-width:450px;
background:#0b0b0b;
border:1px solid rgba(255,255,255,.08);
border-radius:30px;
padding:25px;
box-shadow:0 0 40px rgba(255,0,0,.15);
animation:fade 1s ease;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.poster{
width:100%;
border-radius:25px;
height:240px;
object-fit:cover;
margin-bottom:25px;
}

.title{
font-size:30px;
font-weight:800;
margin-bottom:5px;
}

.sub{
color:#aaa;
margin-bottom:25px;
}

.input{
width:100%;
height:60px;
background:#111;
border:none;
outline:none;
border-radius:18px;
padding:0 20px;
color:white;
font-size:16px;
margin-bottom:18px;
}

select.input{
appearance:none;
}

.btn{
width:100%;
height:60px;
border:none;
border-radius:20px;
background:linear-gradient(90deg,#ff0000,#ff5e00);
color:white;
font-size:18px;
font-weight:700;
cursor:pointer;
transition:.3s;
box-shadow:0 0 20px rgba(255,0,0,.4);
}

.btn:hover{
transform:scale(1.03);
}

.loading{
display:none;
margin-top:20px;
text-align:center;
}

.loader{
width:60px;
height:60px;
border:5px solid rgba(255,255,255,.1);
border-top:5px solid red;
border-radius:50%;
margin:auto;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

.loading p{
margin-top:15px;
color:#bbb;
font-size:15px;
}
</style>
</head>
<body>

<div class="bg"></div>

<div class="container">

<img src="banner.jpg" class="poster">

<div class="title">WESTLIFE</div>
<div class="sub">25 YEARS OF HITS TOUR</div>

<input type="text" class="input" id="nama" placeholder="Nama Lengkap">

<input type="email" class="input" id="email" placeholder="Email">

<input type="number" class="input" id="wa" placeholder="WhatsApp">

<input type="text" class="input" id="alamat" placeholder="Alamat">

<select class="input" id="kategori">
<option value="">Kategori Tiket</option>
<option>Festival</option>
<option>VIP</option>
<option>VVIP</option>
<option>Tribune</option>
</select>

<input type="number" class="input" id="jumlah" placeholder="Jumlah Tiket">

<button class="btn" onclick="proses()">LANJUTKAN PEMBAYARAN</button>

<div class="loading" id="loading">
<div class="loader"></div>
<p>Memverifikasi data pembelian...</p>
</div>

</div>

<script>
function proses(){

let nama=document.getElementById('nama').value;
let email=document.getElementById('email').value;
let wa=document.getElementById('wa').value;
let alamat=document.getElementById('alamat').value;
let kategori=document.getElementById('kategori').value;
let jumlah=document.getElementById('jumlah').value;

localStorage.setItem("nama",nama);
localStorage.setItem("email",email);
localStorage.setItem("wa",wa);
localStorage.setItem("alamat",alamat);
localStorage.setItem("kategori",kategori);
localStorage.setItem("jumlah",jumlah);

document.getElementById("loading").style.display="block";

setTimeout(()=>{
window.location.href="failed.html";
},3000);

}
</script>

</body>
</html>
