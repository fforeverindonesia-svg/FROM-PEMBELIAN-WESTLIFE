<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Westlife Failed Payment</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
overflow-x:hidden;
color:white;
}

body::before{
content:'';
position:fixed;
inset:0;
background:
radial-gradient(circle at top,#ff000055,#000 60%);
z-index:-1;
animation:bgMove 6s infinite alternate;
}

@keyframes bgMove{
0%{
transform:scale(1);
}
100%{
transform:scale(1.15);
}
}

.container{
width:100%;
max-width:430px;
background:rgba(0,0,0,.92);
border-radius:38px;
overflow:hidden;
border:1px solid rgba(255,255,255,.2);
box-shadow:0 0 45px rgba(255,0,0,.45);
animation:fade .8s ease;
backdrop-filter:blur(8px);
}

@keyframes fade{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.banner{
width:100%;
height:260px;
object-fit:cover;
display:block;
}

.content{
padding:28px;
}

.title{
font-size:20px;
font-weight:bold;
color:#ff2b2b;
margin-bottom:30px;
text-shadow:0 0 10px red;
}

.row{
display:flex;
justify-content:space-between;
align-items:flex-start;
gap:15px;
margin-bottom:28px;
}

.label{
color:#9f9f9f;
font-size:17px;
min-width:110px;
}

.value{
font-size:18px;
font-weight:bold;
text-align:right;
line-height:1.5;
flex:1;
word-break:break-word;
}

.status{
background:#ff0000;
padding:14px 38px;
border-radius:18px;
font-size:20px;
font-weight:bold;
box-shadow:0 0 20px red;
animation:pulse 1s infinite alternate;
}

@keyframes pulse{
from{
transform:scale(1);
}
to{
transform:scale(1.06);
}
}

.bottom{
margin-top:30px;
height:12px;
background:#111;
border-radius:20px;
overflow:hidden;
}

.bottom span{
display:block;
height:100%;
width:35%;
margin-left:auto;
background:linear-gradient(90deg,#ff0000,#ff6600);
border-radius:20px;
box-shadow:0 0 20px red;
animation:bar 2s infinite alternate;
}

@keyframes bar{
from{
width:35%;
}
to{
width:48%;
}
}

@media(max-width:500px){

.banner{
height:220px;
}

.title{
font-size:17px;
}

.label{
font-size:15px;
min-width:95px;
}

.value{
font-size:16px;
}

.status{
font-size:18px;
padding:13px 28px;
}

}

</style>
</head>

<body>

<div class="container">

<img src="banner.png" class="banner">

<div class="content">

<div class="title">
RINGKASAN PEMESANAN
</div>

<div class="row">
<div class="label">Nama Event</div>
<div class="value">
WESTLIFE 25 YEARS OF HITS
</div>
</div>

<div class="row">
<div class="label">Tanggal</div>
<div class="value">
Saturday, 23 January 2027
</div>
</div>

<div class="row">
<div class="label">Venue</div>
<div class="value">
Gelora Bung Karno Main Stadium
</div>
</div>

<div class="row">
<div class="label">Layanan</div>
<div class="value">
Ticketing Service / Jastip Tiket
</div>
</div>

<div class="row">
<div class="label">Nama</div>
<div class="value" id="nama">
-
</div>
</div>

<div class="row">
<div class="label">Kategori</div>
<div class="value" id="kategori">
-
</div>
</div>

<div class="row">
<div class="label">Jumlah</div>
<div class="value" id="jumlah">
-
</div>
</div>

<div class="row">
<div class="label">Total</div>
<div class="value" id="total">
-
</div>
</div>

<div class="row">
<div class="label">Status</div>
<div class="value">
<span class="status">
FAILED
</span>
</div>
</div>

<div class="row">
<div class="label">Waktu</div>
<div class="value" id="waktu">
-
</div>
</div>

<div class="row">
<div class="label">Order ID</div>
<div class="value" id="orderid">
-
</div>
</div>

<div class="bottom">
<span></span>
</div>

</div>
</div>

<script>

/*
AMBIL DATA DARI INDEX.HTML
*/

document.getElementById('nama').innerHTML =
localStorage.getItem('nama') || '-';

document.getElementById('kategori').innerHTML =
localStorage.getItem('kategori') || '-';

document.getElementById('jumlah').innerHTML =
localStorage.getItem('jumlah') || '-';

document.getElementById('total').innerHTML =
localStorage.getItem('total') || '-';

/*
WAKTU OTOMATIS
*/

const now = new Date();

document.getElementById('waktu').innerHTML =
now.toLocaleDateString('id-ID') +
', ' +
now.toLocaleTimeString('id-ID');

/*
ORDER ID RANDOM
*/

const randomID =
'WL25-' +
Math.floor(Math.random()*99999999);

document.getElementById('orderid').innerHTML =
randomID;

</script>

</body>
</html>
